{% comment %}
Chart Container Component
Usage: {% include 'components/chart_container.html' with title="Chart Title" chart_id="myChart" %}
{% endcomment %}

<div class="bg-white rounded-xl border border-slate-200/60 overflow-hidden">
    <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="text-sm font-semibold text-slate-700">{{ title }}</h3>
        {% if subtitle %}
        <span class="text-xs text-slate-400">{{ subtitle }}</span>
        {% endif %}
    </div>
    <div class="p-5">
        <div class="h-56 relative">
            <canvas id="{{ chart_id }}" data-testid="{{ chart_id }}"></canvas>
        </div>
        {% if footer %}
        <div class="mt-4 pt-4 border-t border-slate-100">
            {{ footer }}
        </div>
        {% endif %}
    </div>
</div>
