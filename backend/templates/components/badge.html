{# Badge Component
   Usage: {% include "components/badge.html" with label="Success" variant="success" %}
#}
<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold
    {% if variant == 'success' %}bg-emerald-100 text-emerald-800
    {% elif variant == 'warning' %}bg-amber-100 text-amber-800
    {% elif variant == 'danger' %}bg-red-100 text-red-800
    {% elif variant == 'info' %}bg-blue-100 text-blue-800
    {% else %}bg-slate-100 text-slate-800{% endif %}">
    {{ label }}
</span>
