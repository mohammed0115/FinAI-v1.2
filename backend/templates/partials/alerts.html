{# Messages / Alerts Partial
   Usage: {% include "partials/alerts.html" %}
#}
{% if messages %}
<div class="mb-6 space-y-3">
    {% for message in messages %}
    <div class="px-4 py-3 rounded-lg text-sm border
        {% if message.tags == 'error' %}bg-red-50 text-red-700 border-red-200
        {% elif message.tags == 'success' %}bg-emerald-50 text-emerald-700 border-emerald-200
        {% elif message.tags == 'warning' %}bg-amber-50 text-amber-700 border-amber-200
        {% else %}bg-blue-50 text-blue-700 border-blue-200{% endif %}
        flex items-start gap-3">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            {% if message.tags == 'error' %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            {% elif message.tags == 'success' %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            {% elif message.tags == 'warning' %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 4v2M6 5h12a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2z"/>
            {% else %}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            {% endif %}
        </svg>
        <div>{{ message }}</div>   
    </div>
    {% endfor %}
</div>
{% endif %}
