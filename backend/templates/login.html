<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - FinAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'IBM Plex Sans Arabic', sans-serif; }
    </style>
</head>
<body class="h-full bg-slate-100">
    <div class="min-h-full flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-sm">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-800">FinAI</h1>
                <p class="text-sm text-slate-500 mt-1">منصة التدقيق المالي الذكي</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white border border-slate-200 rounded-lg p-6">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">تسجيل الدخول</h2>
                
                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    
                    {% if messages %}
                        {% for message in messages %}
                        <div class="p-3 bg-red-50 border border-red-200 rounded text-sm text-red-700">
                            {{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}

                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-600 mb-1">البريد الإلكتروني</label>
                        <input id="email" name="email" type="email" required 
                            data-testid="login-email-input"
                            class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-slate-500 focus:border-slate-500"
                            placeholder="example@domain.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-600 mb-1">كلمة المرور</label>
                        <input id="password" name="password" type="password" required
                            data-testid="login-password-input"
                            class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-slate-500 focus:border-slate-500"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" 
                        data-testid="login-submit-btn"
                        class="w-full py-2 px-4 bg-slate-800 text-white text-sm font-medium rounded hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500">
                        دخول
                    </button>
                </form>

                <!-- Demo Credentials -->
                <div class="mt-6 pt-4 border-t border-slate-200">
                    <p class="text-xs text-slate-500 text-center mb-2">بيانات الدخول التجريبية</p>
                    <div class="bg-slate-50 rounded p-3 text-xs text-slate-600 space-y-1">
                        <div class="flex justify-between">
                            <span>البريد:</span>
                            <code class="text-slate-800">admin@finai.com</code>
                        </div>
                        <div class="flex justify-between">
                            <span>كلمة المرور:</span>
                            <code class="text-slate-800">admin123</code>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-slate-400 mt-6">
                منصة التدقيق والامتثال المالي لدول الخليج
            </p>
        </div>
    </div>
</body>
</html>
